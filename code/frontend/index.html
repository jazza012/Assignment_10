<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestration Monitor</title>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <div class="container">
            <header class="header glass">
                <h1>Agent Orchestration Monitor</h1>
                <div class="query-input-container" style="display: flex; gap: 10px; margin-top: 10px;">
                    <input 
                        type="text" 
                        id="queryInput"
                        value="Compare top 3 Hugging Face text-generation models sorted by likes." 
                        style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; background: rgba(255, 255, 255, 0.9);"
                    />
                    <button class="run-btn" id="runBtn">Run Query</button>
                </div>
            </header>
            <div id="content">
                <div class="loading" style="display: flex; justify-content: center; align-items: center; height: 50vh; font-size: 1.5rem; color: var(--text-muted);">
                    Initializing Monitor...
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
